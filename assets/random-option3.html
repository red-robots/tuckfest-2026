<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Random Flip Gallery</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: sans-serif;
}

.image-section {
  padding: 60px 20px;
}

.image-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.grid-image {
  width: 100%;
  height: 200px;
  object-fit: cover;
  transition: opacity 0.5s ease;
}
</style>
</head>
<body>
<div class="image-section">
  <div class="image-grid">
    <img class="grid-image" src="https://picsum.photos/400/300?random=1">
    <img class="grid-image" src="https://picsum.photos/400/300?random=2">
    <img class="grid-image" src="https://picsum.photos/400/300?random=3">
    <img class="grid-image" src="https://picsum.photos/400/300?random=4">
    <img class="grid-image" src="https://picsum.photos/400/300?random=5">
    <img class="grid-image" src="https://picsum.photos/400/300?random=6">
  </div>
</div>

<script>
const images = document.querySelectorAll('.grid-image');
let counter = 7; // for unique Picsum URLs

function changeOneImage() {
  const randomIndex = Math.floor(Math.random() * images.length);
  const img = images[randomIndex];

  // Fade out
  img.style.opacity = 0;

  setTimeout(() => {
    // Change image
    img.src = `https://picsum.photos/400/300?random=${counter++}`;
    // Fade in
    img.style.opacity = 1;
  }, 500);
}

// Run once every 2 minutes (120000 ms)
//setInterval(changeOneImage, 120000);

// Run once every 1 minute (60000 ms)
setInterval(changeOneImage, 5000);
</script>
</body>
</html>
